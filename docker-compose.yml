version: '3.8'

services:
  # Streamlit Dashboard Container
  dashboard:
    build: .
    container_name: credit_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow_server:5000
    depends_on:
      - mlflow_server

  # MLflow Tracking Server Container
  mlflow_server:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: credit_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./models:/app/models
    command: >
      mlflow server
      --backend-store-uri sqlite:///app/mlruns/mlflow.db
      --default-artifact-root /app/models
      --host 0.0.0.0
      --port 5000
